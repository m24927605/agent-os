syntax = "proto3";

package agentos.kernel.ingest.v1;

option go_package = "github.com/agent-os/kernel/internal/ingestpb;ingestpb";

// AppendService is the kernel's ingest surface. It is APPEND-ONLY by construction: exactly one RPC
// (Append) and no Update/Delete/Rewrite/Upsert/Overwrite — the control plane can only append, never
// rewrite history (HARD CONSTRAINT; gating c1/c4). The server additionally enforces monotonic
// per-source sequence and fails closed (typed AppendError + audit) on replay/gap/malformed.
service AppendService {
  rpc Append(AppendRequest) returns (AppendResponse);
  // Checkpoint is READ-ONLY: under the same append mutex it atomically captures a consistent snapshot
  // anchor {head_entry_hash, head_sequence, per_source_next_seq}. It NEVER appends, rewrites, or
  // truncates — it is a consistent read of the chain head + per-source next sequence so a snapshot
  // cannot observe a torn (half-written) tail. It does NOT widen the append-only surface.
  rpc Checkpoint(CheckpointRequest) returns (CheckpointResponse);
  // ListEntries is READ-ONLY: under the same append mutex it captures a consistent snapshot of the
  // durable WORM chain (store.Load), filters to sequence >= from_sequence, and returns the entries so a
  // client can re-derive entryHash and verify chain integrity (reading != attesting). It NEVER appends,
  // rewrites, or truncates, and on a durable read failure returns Internal — never a partial slice. It
  // does NOT widen the append-only surface.
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
}

message AppendRequest {
  string source_id = 1;       // per-source monotonic sequence key (P3 binds tenant identity)
  uint64 sequence = 2;        // the expected next sequence for this source (kernel enforces monotonic)
  bytes canonical_event = 3;  // ALREADY-redacted S0.2 canonical bytes (kernel never holds the raw secret)
  string partition_id = 4;    // P3 tenant partition routing; empty => single-chain servers ignore it, the partitioned server fail-closed denies
}

// Receipt — the server computes prev_hash/entry_hash/content_hash; the client cannot set them.
message Receipt {
  uint64 sequence = 1;
  string content_hash = 2;    // "sha256:"-prefixed (versioned prefix; not hardcoded to sha256 forever)
  string prev_hash = 3;       // "sha256:"-prefixed
  string entry_hash = 4;      // "sha256:"-prefixed
}

message AppendError {
  enum Code {
    CODE_UNSPECIFIED = 0;     // proto3 zero value -> treated as deny (fail-closed), never success
    SEQUENCE_GAP = 1;         // sequence > next: gap detected
    SEQUENCE_REPLAY = 2;      // sequence < next: position already settled -> rewrite refused (append-only)
    MALFORMED = 3;            // canonical_event not parseable / not canonical
  }
  Code code = 1;
  string detail = 2;          // static reason / field name only — never echoes canonical_event content
}

message AppendResponse {
  oneof result {
    Receipt receipt = 1;
    AppendError error = 2;
  }
}

// CheckpointRequest carries no fields: the anchor is the kernel's single global chain head; there is
// no per-task / per-tenant scoping at the kernel (the WORM log is shared, monotonic, single-writer).
message CheckpointRequest {}

// CheckpointResponse — the snapshot-safe anchor captured atomically under the append mutex.
message CheckpointResponse {
  string head_entry_hash = 1;             // current chain head entryHash ("sha256:"-prefixed); genesis if empty log
  uint64 head_sequence = 2;               // sequence of the head record (0 for an empty log; check per_source_next_seq for emptiness)
  map<string, uint64> per_source_next_seq = 3; // expected next sequence per source (empty map => no appends yet)
}

// Entry is one read-back WORM record, field-aligned with chain.LogEntry (verifier-compatible). The
// server re-derives canonical_event from the stored (already-redacted) event via the SAME canonical
// function the chain used to seal it, so EntryHashFromCanonical(canonical_event, prev_hash, sequence)
// reproduces entry_hash byte-for-byte. The client cannot set these — they are read from the durable log.
message Entry {
  uint64 sequence = 1;
  bytes canonical_event = 2;  // ALREADY-redacted canonical bytes (re-derived; byte-identical to what was hashed)
  string prev_hash = 3;       // "sha256:"-prefixed
  string entry_hash = 4;      // "sha256:"-prefixed
}

// ListEntriesRequest selects the chain tail: entries with sequence >= from_sequence (0 => the whole log).
message ListEntriesRequest {
  uint64 from_sequence = 1;
}

// ListEntriesResponse carries the consistent snapshot of entries in chain order (never a partial slice;
// a durable read failure surfaces as an Internal error instead).
message ListEntriesResponse {
  repeated Entry entries = 1;
}

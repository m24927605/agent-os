syntax = "proto3";

package openshell.v1;

// OpenShell service — SUBSET. Health (openshell.proto:22) + the unary sandbox lifecycle
// CreateSandbox (openshell.proto:25) / GetSandbox (openshell.proto:28) / DeleteSandbox
// (openshell.proto:46) + ExecSandbox (openshell.proto:67).
service OpenShell {
  // Check the health of the service.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Create a sandbox (unary).
  rpc CreateSandbox(CreateSandboxRequest) returns (SandboxResponse);

  // Fetch a sandbox by its canonical name (unary readiness probe).
  rpc GetSandbox(GetSandboxRequest) returns (SandboxResponse);

  // Delete a sandbox by its canonical name (unary).
  rpc DeleteSandbox(DeleteSandboxRequest) returns (DeleteSandboxResponse);

  // Execute a command in a ready sandbox and stream output.
  rpc ExecSandbox(ExecSandboxRequest) returns (stream ExecSandboxEvent);

  // Watch a sandbox: stream status snapshots / logs / events (server-streaming readiness).
  rpc WatchSandbox(WatchSandboxRequest) returns (stream SandboxStreamEvent);
}

// Health check request (openshell.proto:277).
message HealthRequest {}

// Health check response (openshell.proto:280-284).
message HealthResponse {
  // Service status.
  ServiceStatus status = 1;

  // Service version.
  string version = 2;
}

// Service status enum (openshell.proto:1485-1490).
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_HEALTHY = 1;
  SERVICE_STATUS_DEGRADED = 2;
  SERVICE_STATUS_UNHEALTHY = 3;
}

// --- Sandbox lifecycle (slice SLICE-OS-S2a) — copied VERBATIM (field numbers/types) from v0.0.66. ---
// We ENCODE/DECODE only the fields we consume; every other upstream field is reserved (its number is
// recorded as a comment) so we never reuse it and the codec skips it (forward-compatible).

// Create sandbox request (openshell.proto:427-433).
message CreateSandboxRequest {
  // Desired sandbox configuration. We populate ONLY spec.template.image.
  SandboxSpec spec = 1;
  // Optional user-supplied sandbox name. When empty the server generates one.
  string name = 2;
  // Optional labels for the sandbox (key-value metadata).
  map<string, string> labels = 3;
}

// Desired sandbox configuration (openshell.proto SandboxSpec). Upstream also carries log_level=1,
// environment=5, policy=7, providers=8, gpu=9 (+ reserved 10/11); we encode ONLY `template` (=6).
message SandboxSpec {
  reserved 1, 5, 7, 8, 9, 10, 11; // log_level, environment, policy, providers, gpu, (reserved upstream)
  // Container or VM template used to provision the sandbox.
  SandboxTemplate template = 6;
}

// Container/VM template (openshell.proto SandboxTemplate). Upstream carries many fields; we encode
// ONLY the pinned boot image (=1).
message SandboxTemplate {
  // Fully-qualified OCI image reference used to boot the sandbox (MUST be a pinned sha256 digest).
  string image = 1;
}

// Generic sandbox response wrapper (openshell.proto SandboxResponse).
message SandboxResponse {
  // The sandbox object. Absent on a garbled/empty wire => deny-by-default upstream.
  Sandbox sandbox = 1;
}

// A sandbox object (openshell.proto Sandbox). We decode metadata (=1) + status (=3); spec (=2) is
// skipped (the upstream `reserved 4, 5` is recorded so we never reuse those numbers).
message Sandbox {
  // Kubernetes-style metadata (id, name, …).
  openshell.datamodel.v1.ObjectMeta metadata = 1;
  reserved 2; // spec (SandboxSpec) — echoed by the gateway but not consumed here.
  // Latest user-facing observed status derived by the gateway.
  SandboxStatus status = 3;
  reserved 4, 5; // upstream reserved ("phase", "current_policy_version").
}

// Kubernetes-style object metadata (datamodel.proto:12). We decode id (=1) + name (=2) only.
message ObjectMeta {
  // Stable object ID generated by the gateway (the WatchSandbox / ExecSandbox lookup key).
  string id = 1;
  // Human-readable object name (the GetSandbox / DeleteSandbox lookup key).
  string name = 2;
}

// Observed sandbox status (openshell.proto:366-380). Upstream carries sandbox_name=1, agent_pod=2,
// agent_fd=3, sandbox_fd=4, conditions=5, current_policy_version=7; we decode ONLY `phase` (=6).
message SandboxStatus {
  reserved 1, 2, 3, 4, 5, 7; // sandbox_name, agent_pod, agent_fd, sandbox_fd, conditions, current_policy_version
  // Gateway-derived lifecycle summary.
  SandboxPhase phase = 6;
}

// Sandbox lifecycle phase enum (openshell.proto). Numeric values match upstream EXACTLY so wire
// decoding stays faithful; only READY/ERROR are terminal for readiness.
enum SandboxPhase {
  SANDBOX_PHASE_UNSPECIFIED = 0;
  SANDBOX_PHASE_PROVISIONING = 1;
  SANDBOX_PHASE_READY = 2;
  SANDBOX_PHASE_ERROR = 3;
  SANDBOX_PHASE_DELETING = 4;
  SANDBOX_PHASE_UNKNOWN = 5;
}

// Get sandbox request (openshell.proto:436-439).
message GetSandboxRequest {
  // Sandbox name (canonical lookup key).
  string name = 1;
}

// Delete sandbox request (openshell.proto:482-485).
message DeleteSandboxRequest {
  // Sandbox name (canonical lookup key).
  string name = 1;
}

// Delete sandbox response (openshell.proto:517-519).
message DeleteSandboxResponse {
  bool deleted = 1;
}

// Execute command request (openshell.proto:645-672). Copied VERBATIM from v0.0.66. The tty fields
// (tty=7, cols=8, rows=9) are part of the upstream message but OUT OF SCOPE for this slice (we never
// request a pty); their field numbers are reserved here so we never reuse them in a future subset.
message ExecSandboxRequest {
  // Sandbox id.
  string sandbox_id = 1;

  // Command and arguments.
  repeated string command = 2;

  // Optional working directory.
  string workdir = 3;

  // Optional environment overrides.
  map<string, string> environment = 4;

  // Optional timeout in seconds. 0 means no timeout.
  uint32 timeout_seconds = 5;

  // Optional stdin payload passed to the command.
  bytes stdin = 6;

  reserved 7, 8, 9; // tty, cols, rows (interactive/pty — out of scope).
  reserved "tty", "cols", "rows";
}

// One stdout chunk from a sandbox exec (openshell.proto:675-677).
message ExecSandboxStdout {
  bytes data = 1;
}

// One stderr chunk from a sandbox exec (openshell.proto:680-682).
message ExecSandboxStderr {
  bytes data = 1;
}

// Final exit status for a sandbox exec (openshell.proto:685-687).
message ExecSandboxExit {
  int32 exit_code = 1;
}

// One event in a sandbox exec stream (openshell.proto:690-696).
message ExecSandboxEvent {
  oneof payload {
    ExecSandboxStdout stdout = 1;
    ExecSandboxStderr stderr = 2;
    ExecSandboxExit exit = 3;
  }
}

// --- WatchSandbox streaming readiness (slice SLICE-OS-S2b) — copied VERBATIM from v0.0.66. ----------
// We ENCODE only the 3 readiness-relevant fields (id=1, follow_status=2, stop_on_terminal=7); the log/
// event-following fields (follow_logs=3, follow_events=4, log_tail_lines=5, event_tail=6, log_since_ms=8,
// log_sources=9, log_min_level=10) are OUT OF SCOPE — their numbers are reserved so we never reuse them.

// Watch sandbox request (openshell.proto:761-792). Copied VERBATIM (field numbers/types) from v0.0.66.
message WatchSandboxRequest {
  // Sandbox id.
  string id = 1;

  // Stream sandbox status snapshots.
  bool follow_status = 2;

  // Stop streaming once the sandbox reaches a terminal phase (READY or ERROR).
  bool stop_on_terminal = 7;

  reserved 3, 4, 5, 6, 8, 9, 10; // follow_logs, follow_events, log_tail_lines, event_tail, log_since_ms, log_sources, log_min_level (out of scope).
  reserved "follow_logs", "follow_events", "log_tail_lines", "event_tail", "log_since_ms", "log_sources", "log_min_level";
}

// One event in a sandbox watch stream (openshell.proto:795-810). We DECODE only the `sandbox` (=1)
// snapshot (reusing the Sandbox/ObjectMeta/SandboxStatus decode); the log (=2) / event (=3) /
// warning (=4) / draft_policy_update (=5) variants carry no readiness signal and are SKIPPED (their
// message types are intentionally NOT vendored — forward-compatible: an unknown oneof variant decodes
// to an absent sandbox, NEVER a fabricated READY).
message SandboxStreamEvent {
  oneof payload {
    // Latest sandbox snapshot.
    Sandbox sandbox = 1;
    // log (=2), event (=3), warning (=4), draft_policy_update (=5) — out of scope; skipped on decode.
  }
}

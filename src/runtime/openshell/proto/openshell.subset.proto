//
// This file vendors ONLY the subset of `openshell.v1` that we consume: the `Health` RPC and its
// request/response messages + the `ServiceStatus` enum (slice P2R-R1-S1), the `ExecSandbox`
// server-streaming RPC + its ExecSandboxRequest / ExecSandboxEvent / ExecSandboxStdout /
// ExecSandboxStderr / ExecSandboxExit messages (slice SLICE-OS-S1), and the unary sandbox lifecycle
// RPCs CreateSandbox / GetSandbox / DeleteSandbox + their CreateSandboxRequest / SandboxSpec /
// SandboxTemplate / SandboxResponse / Sandbox / ObjectMeta / SandboxStatus / SandboxPhase /
// GetSandboxRequest / DeleteSandboxRequest / DeleteSandboxResponse messages (slice SLICE-OS-S2a),
// copied VERBATIM (field numbers/types) from the v0.0.66 upstream proto (openshell.proto +
// datamodel.proto). We vendor ONLY the fields we encode/decode (SandboxSpec.template, ObjectMeta
// id/name, SandboxStatus.phase); the other fields exist upstream but are intentionally OUT OF SCOPE
// (the codec skips them, forward-compatible). Slice SLICE-OS-S2b adds the WatchSandbox server-streaming
// RPC + its WatchSandboxRequest (id=1, follow_status=2, stop_on_terminal=7) / SandboxStreamEvent
// (oneof payload, we decode ONLY sandbox=1) messages — completing the readiness transport. The rest of

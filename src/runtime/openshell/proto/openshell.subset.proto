syntax = "proto3";

package openshell.v1;

// OpenShell service — SUBSET. Health (openshell.proto:22) + ExecSandbox (openshell.proto:67).
service OpenShell {
  // Check the health of the service.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Execute a command in a ready sandbox and stream output.
  rpc ExecSandbox(ExecSandboxRequest) returns (stream ExecSandboxEvent);
}

// Health check request (openshell.proto:277).
message HealthRequest {}

// Health check response (openshell.proto:280-284).
message HealthResponse {
  // Service status.
  ServiceStatus status = 1;

  // Service version.
  string version = 2;
}

// Service status enum (openshell.proto:1485-1490).
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_HEALTHY = 1;
  SERVICE_STATUS_DEGRADED = 2;
  SERVICE_STATUS_UNHEALTHY = 3;
}

// Execute command request (openshell.proto:645-672). Copied VERBATIM from v0.0.66. The tty fields
// (tty=7, cols=8, rows=9) are part of the upstream message but OUT OF SCOPE for this slice (we never
// request a pty); their field numbers are reserved here so we never reuse them in a future subset.
message ExecSandboxRequest {
  // Sandbox id.
  string sandbox_id = 1;

  // Command and arguments.
  repeated string command = 2;

  // Optional working directory.
  string workdir = 3;

  // Optional environment overrides.
  map<string, string> environment = 4;

  // Optional timeout in seconds. 0 means no timeout.
  uint32 timeout_seconds = 5;

  // Optional stdin payload passed to the command.
  bytes stdin = 6;

  reserved 7, 8, 9; // tty, cols, rows (interactive/pty — out of scope).
  reserved "tty", "cols", "rows";
}

// One stdout chunk from a sandbox exec (openshell.proto:675-677).
message ExecSandboxStdout {
  bytes data = 1;
}

// One stderr chunk from a sandbox exec (openshell.proto:680-682).
message ExecSandboxStderr {
  bytes data = 1;
}

// Final exit status for a sandbox exec (openshell.proto:685-687).
message ExecSandboxExit {
  int32 exit_code = 1;
}

// One event in a sandbox exec stream (openshell.proto:690-696).
message ExecSandboxEvent {
  oneof payload {
    ExecSandboxStdout stdout = 1;
    ExecSandboxStderr stderr = 2;
    ExecSandboxExit exit = 3;
  }
}

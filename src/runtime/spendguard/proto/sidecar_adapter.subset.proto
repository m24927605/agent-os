syntax = "proto3";

package spendguard.sidecar_adapter.v1;

import "google/protobuf/timestamp.proto";

// ============================================================================
// SERVICE — SUBSET (session reservation lifecycle + explicit release)
// ============================================================================

service SidecarAdapter {
  // (S8) Initial handshake; mandatory before any other RPC. The transport reads
  // back the negotiated session_id. (adapter.proto:39)
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // (S8) Adapter requests a decision at a *.pre trigger point. The IMPLEMENTED
  // gating flow in the demo sidecar (adapter_uds.rs:82). (adapter.proto:46)
  rpc RequestDecision(DecisionRequest) returns (DecisionResponse);

  // (S8) Adapter confirms the publish_effect outcome (settles a decision).
  // (adapter.proto:50)
  rpc ConfirmPublishOutcome(PublishOutcomeRequest)
      returns (PublishOutcomeResponse);

  // Reserve a session-scoped ledger hold before a realtime session connects to
  // paid model providers. Idempotent by
  // (tenant_id, session_id, route, idempotency_key). (adapter.proto:124)
  rpc ReserveSession(ReserveSessionRequest) returns (ReserveSessionOutcome);

  // Commit one positive streaming spend delta against an existing session
  // reservation. Idempotent by (session_reservation_id, streaming_commit_id).
  // amount_atomic_delta MUST be > 0. (adapter.proto:129)
  rpc CommitSessionDelta(CommitSessionDeltaRequest)
      returns (CommitSessionDeltaOutcome);

  // Release the uncommitted remainder of a session-scoped reservation.
  // Idempotent by (session_reservation_id, idempotency_key). (adapter.proto:134)
  rpc ReleaseSession(ReleaseSessionRequest) returns (ReleaseSessionOutcome);

  // Adapter-initiated release of a held reservation before commit.
  // Idempotent by (reservation_id, idempotency_key). (adapter.proto:116)
  rpc ReleaseReservation(ReleaseReservationRequest)
      returns (ReleaseReservationResponse);
}

// ============================================================================
// COMMON dependency types — inlined from spendguard.common.v1 (common.proto)
// ============================================================================

// common.proto:72 — UnitRef.
message UnitRef {
  string unit_id = 1;

  enum Kind {
    KIND_UNSPECIFIED = 0;
    MONETARY = 1;
    TOKEN = 2;
    CREDIT = 3;
    NON_MONETARY = 4;
  }
  Kind kind = 2;

  string currency = 3;
  string unit_name = 4;
  string token_kind = 5;
  string model_family = 6;
  string credit_program = 7;
}

// common.proto:116 — PricingFreeze.
message PricingFreeze {
  string pricing_version = 1;
  bytes price_snapshot_hash = 2;
  string fx_rate_version = 3;
  string unit_conversion_version = 4;
}

// common.proto:200 — Error.
message Error {
  enum Code {
    CODE_UNSPECIFIED = 0;
    FENCING_EPOCH_STALE = 1;
    LOCK_ORDER_TOKEN_MISMATCH = 2;
    PRICING_VERSION_UNKNOWN = 3;
    UNIT_NORMALIZATION_REQUIRED = 4;
    BUDGET_EXHAUSTED = 5;
    DEADLOCK_TIMEOUT = 6;
    SYNC_REPLICA_UNAVAILABLE = 7;
    TENANT_DISABLED = 8;
    SCHEMA_BUNDLE_UNKNOWN = 9;
    SIGNATURE_INVALID = 10;
    AUDIT_INVARIANT_VIOLATED = 11;
    DUPLICATE_DECISION_EVENT = 12;
    RESERVATION_STATE_CONFLICT = 13;
    PRICING_FREEZE_MISMATCH = 14;
    OVERRUN_RESERVATION = 15;
    RESERVATION_TTL_EXPIRED = 16;
    MULTI_RESERVATION_COMMIT_DEFERRED = 17;
    IDEMPOTENCY_CONFLICT = 18;
  }
  Code code = 1;
  string message = 2;
  map<string, string> details = 3;
}

// common.proto:37 — TraceContext (W3C trace context; S8 RequestDecision.trace).
message TraceContext {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string trace_state = 4;
}

// common.proto:51 — SpendGuardIds (canonical UUID v7 IDs; S8 RequestDecision.ids).
message SpendGuardIds {
  string run_id = 1;
  string step_id = 2;
  string llm_call_id = 3;
  string tool_call_id = 4;
  string decision_id = 5;
  string snapshot_id = 6;
}

// common.proto:232 — BudgetClaim (a single projected cost claim; S8 Inputs.projected_claims).
message BudgetClaim {
  string budget_id = 1;
  UnitRef unit = 2;
  string amount_atomic = 3;

  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    DEBIT = 1;
    CREDIT = 2;
  }
  Direction direction = 4;

  string window_instance_id = 5;
}

// ============================================================================
// Session reservation (D41 voice substrate SR-V1) — adapter.proto:855-955
// ============================================================================

message ReserveSessionRequest {
  string tenant_id = 1;
  string budget_id = 2;
  string window_instance_id = 3;
  UnitRef unit = 4;
  PricingFreeze pricing = 5;
  string session_id = 6;
  string route = 7;
  string estimated_amount_atomic = 8;
  uint32 ttl_seconds = 9;
  string idempotency_key = 10;
}

message ReserveSessionOutcome {
  oneof outcome {
    ReserveSessionAccepted accepted = 1;
    ReserveSessionDenied denied = 2;
    Error error = 3;
  }
}

message ReserveSessionAccepted {
  string session_reservation_id = 1;
  string ledger_transaction_id = 2;
  string audit_session_event_id = 3;
  google.protobuf.Timestamp ttl_expires_at = 4;
  string reserved_amount_atomic = 5;
  string remaining_amount_atomic = 6;
}

message ReserveSessionDenied {
  string audit_session_event_id = 1;
  repeated string reason_codes = 2;
  repeated string matched_rule_ids = 3;
  Error error = 4;
}

message CommitSessionDeltaRequest {
  string session_reservation_id = 1;
  string streaming_commit_id = 2;
  string amount_atomic_delta = 3;

  enum Outcome {
    OUTCOME_UNSPECIFIED = 0;
    SUCCESS = 1;
    PROVIDER_ERROR = 2;
    CLIENT_TIMEOUT = 3;
    RUN_ABORTED = 4;
  }
  Outcome outcome = 4;

  google.protobuf.Timestamp event_time = 5;
  string idempotency_key = 6;
}

message CommitSessionDeltaOutcome {
  oneof outcome {
    CommitSessionDeltaAccepted accepted = 1;
    Error error = 2;
  }
}

message CommitSessionDeltaAccepted {
  string session_reservation_id = 1;
  string streaming_commit_id = 2;
  string ledger_transaction_id = 3;
  string audit_session_event_id = 4;
  string committed_delta_atomic = 5;
  string cumulative_committed_atomic = 6;
  string remaining_amount_atomic = 7;
  google.protobuf.Timestamp recorded_at = 8;
}

message ReleaseSessionRequest {
  string session_reservation_id = 1;
  string reason_code = 2;
  google.protobuf.Timestamp event_time = 3;
  string idempotency_key = 4;
}

message ReleaseSessionOutcome {
  oneof outcome {
    ReleaseSessionAccepted accepted = 1;
    Error error = 2;
  }
}

message ReleaseSessionAccepted {
  string session_reservation_id = 1;
  string ledger_transaction_id = 2;
  string audit_session_event_id = 3;
  string released_amount_atomic = 4;
  string committed_amount_atomic = 5;
  google.protobuf.Timestamp recorded_at = 6;
}

// ============================================================================
// ReleaseReservation (Agent Spend Protocol Draft-01 §4) — adapter.proto:774-849
// ============================================================================

message ReleaseReservationRequest {
  string reservation_id = 1;
  string idempotency_key = 2;
  repeated string reason_codes = 3;

  string tenant_id = 100;
  string workload_instance_id = 101;
  string session_id = 102;
}

message ReleaseReservationResponse {
  bytes audit_event_signature = 1;

  string ledger_transaction_id = 100;
  repeated string released_reservation_ids = 101;
}

// ============================================================================
// (S8) Gating flow the demo sidecar ACTUALLY serves — adapter.proto:34-55,190-540
//
// Only the fields the credential-blind transport sends or reads are vendored;
// the upstream prediction / subscription-meter / approval datamodel is OMITTED
// (proto3 additive evolution keeps the present tags wire-compatible).
// ============================================================================

// adapter.proto:190 — HandshakeRequest (we send a minimal mandatory handshake).
message HandshakeRequest {
  string sdk_version = 1;
  string runtime_kind = 2;
  string runtime_version = 3;
  string tenant_id_assertion = 5;
  uint32 protocol_version = 7;
}

// adapter.proto:211 — HandshakeResponse (we read back the negotiated session_id).
message HandshakeResponse {
  string sidecar_version = 1;
  uint32 protocol_version = 6;
  string session_id = 7;
}

// adapter.proto:309 — DecisionRequest (we send session_id, trigger, route, cost
// projection in Inputs; trace / ids carried opaque). Idempotency / prediction /
// subscription-meter fields are OMITTED (the credential-blind transport sends none).
message DecisionRequest {
  string session_id = 1;

  enum Trigger {
    TRIGGER_UNSPECIFIED = 0;
    RUN_PRE = 1;
    AGENT_STEP_PRE = 2;
    LLM_CALL_PRE = 3;
    TOOL_CALL_PRE = 4;
  }
  Trigger trigger = 2;

  TraceContext trace = 3;
  SpendGuardIds ids = 4;
  string route = 5;

  message Inputs {
    repeated BudgetClaim projected_claims = 1;
    string projected_p50_atomic = 2;
    string projected_p90_atomic = 3;
    string projected_p95_atomic = 4;
    string projected_p99_atomic = 5;
    UnitRef projected_unit = 6;
  }
  Inputs inputs = 6;
}

// adapter.proto:422 — DecisionResponse (we read decision_id + the decision enum;
// unknown enum MUST fail closed per adapter.proto:448).
message DecisionResponse {
  string decision_id = 1;
  string audit_decision_event_id = 2;

  enum Decision {
    DECISION_UNSPECIFIED = 0;
    CONTINUE = 1;
    DEGRADE = 2;
    SKIP = 3;
    STOP = 4;
    REQUIRE_APPROVAL = 5;
    STOP_RUN_PROJECTION = 6;
  }
  Decision decision = 3;

  repeated string reason_codes = 4;
  bool terminal = 14;
  Error error = 15;
}

// adapter.proto:516 — PublishOutcomeRequest (commit confirms a decision settled).
message PublishOutcomeRequest {
  string session_id = 1;
  string decision_id = 2;
  bytes effect_hash = 3;

  enum Outcome {
    OUTCOME_UNSPECIFIED = 0;
    APPLIED = 1;
    APPLIED_NOOP = 2;
    APPLY_FAILED = 3;
    APPROVAL_GRANTED = 4;
    APPROVAL_DENIED = 5;
    APPROVAL_TIMED_OUT = 6;
  }
  Outcome outcome = 4;

  string adapter_error = 5;
}

// adapter.proto:535 — PublishOutcomeResponse (a populated error => fail closed).
message PublishOutcomeResponse {
  string audit_outcome_event_id = 1;
  google.protobuf.Timestamp recorded_at = 2;
  Error error = 3;
}

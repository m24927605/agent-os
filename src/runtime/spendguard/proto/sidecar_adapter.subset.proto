// This file vendors ONLY the subset of the `SidecarAdapter` gRPC service that the SpendGuard
// LedgerTransport seams (src/cost/adapters/spendguard/adapter.ts) need to implement for real:
//
//   (S6) the session-reservation lifecycle (ReserveSession / CommitSessionDelta / ReleaseSession —
//        adapter.proto:124/129/134) plus the explicit ReleaseReservation RPC (adapter.proto:116).
//
//   (S8) the gating flow that the DEMO sidecar actually serves (R11-S7 ground truth: the session
//        RPCs above are `unimplemented` in services/sidecar/src/server/adapter_uds.rs:142-173):
//        Handshake (adapter.proto:39) -> RequestDecision (:46) -> ConfirmPublishOutcome (:50). Only
//        the FIELDS the credential-blind transport speaks/reads are vendored — the large prediction /
//        subscription-meter / trace datamodel of these messages stays upstream and is OMITTED here
//        (proto3 additive evolution: omitted tags decode to defaults, present tags wire-match the
//        upstream tag numbers). The trace / budget-grant / drain / approval RPCs remain OUT OF SCOPE.
//
// with their request/response messages and the transitive `spendguard.common.v1` dependencies

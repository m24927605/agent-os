# Go-side HARD CONSTRAINT A enforcement (SLICE-P1-001). depguard v2 rule schema; golangci-lint >= v1.55.0.
# Wired into `pnpm run verify:go` (the S0.8 fail-closed cascade). Later P1 slices only ADD deny rules
# (e.g. internal/canonical must not import internal/chain); they do not relax these cross-plane denies.
linters:
  enable:
    - depguard
    - govet
linters-settings:
  depguard:
    rules:
      kernel-no-cross-plane:
        list-mode: lax
        deny:
          - pkg: github.com/agent-os/agent-os
            desc: "kernel must not import the control plane / SDK; cross-plane only via gRPC proto (HARD CONSTRAINT A)"
          - pkg: agent-os/src
            desc: "kernel must not deep-import the TS control-plane source tree"
          - pkg: github.com/agent-os/sdk
            desc: "kernel must not import the SDK; cross-plane only via typed contract"
      # SLICE-P1-002: chain -> canonical is the only direction; forbid the reverse.
      canonical-no-reverse-dep:
        files:
          - "**/internal/canonical/**"
        list-mode: lax
        deny:
          - pkg: github.com/agent-os/kernel/internal/chain
            desc: "canonical must not import chain (chain -> canonical is the only direction; HARD CONSTRAINT A)"
      # SLICE-P1-003: the standalone verifier must not import the producer (log) — independence by construction.
      verify-no-log:
        files:
          - "**/internal/verify/**"
        list-mode: lax
        deny:
          - pkg: github.com/agent-os/kernel/internal/log
            desc: "the standalone verifier must not import internal/log; it verifies the public chain only (HARD CONSTRAINT A)"
      # SLICE-P1-004: store is pure persistence below sequence; sequence -> store is the only direction.
      store-no-sequence:
        files:
          - "**/internal/store/**"
        list-mode: lax
        deny:
          - pkg: github.com/agent-os/kernel/internal/sequence
            desc: "store must not import sequence (sequence -> store is the only direction; HARD CONSTRAINT A)"
      # SLICE-P1-005: commitgate -> outbox is the only direction; forbid the reverse.
      outbox-no-commitgate:
        files:
          - "**/internal/outbox/**"
        list-mode: lax
        deny:
          - pkg: github.com/agent-os/kernel/internal/commitgate
            desc: "outbox must not import commitgate (commitgate -> outbox is the only direction; HARD CONSTRAINT A)"
